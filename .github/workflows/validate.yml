name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The skills library is a separate public repo; skill-reference checks
      # resolve against it. REQUIRE_SKILLS=1 makes a missing checkout a hard
      # failure instead of a skipped check.
      - uses: actions/checkout@v5
        with:
          repository: rshankras/claude-code-apple-skills
          path: claude-code-apple-skills

      - name: Run validator
        run: REQUIRE_SKILLS=1 ./scripts/validate.sh claude-code-apple-skills
