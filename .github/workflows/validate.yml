name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The skills library is a separate public repo; skill-reference checks
      # resolve against it. REQUIRE_SKILLS=1 makes a missing checkout a hard
      # failure instead of a skipped check.
      - uses: actions/checkout@v5
        with:
          repository: rshankras/claude-code-apple-skills
          path: claude-code-apple-skills

      - name: Run validator
        run: REQUIRE_SKILLS=1 ./scripts/validate.sh claude-code-apple-skills

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Not --strict: two warnings are deliberate (no version = git-SHA
      # channel; CLAUDE.md at root is contributor docs). Errors still fail.
      - name: Validate plugin manifest
        run: claude plugin validate .
